<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      padding: 16px;
      width: 350px;
      color: #1a1a1a;
    }

    h2 {
      font-size: 15px;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      margin-top: 10px;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
    }

    .actions {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button {
      padding: 6px 14px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #93c5fd;
      cursor: default;
    }

    .status {
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .status.visible {
      opacity: 1;
    }

    .status.saved {
      color: #16a34a;
    }

    .status.error {
      color: #dc2626;
    }
  </style>
</head>

<body>
  <h2>Florilegio Settings</h2>

  <label for="apiUrl">API URL</label>
  <input type="text" id="apiUrl" placeholder="https://florilegio.your-account.workers.dev">

  <label for="apiToken">API Token</label>
  <input type="password" id="apiToken" placeholder="your-secret-token">

  <div class="actions">
    <button id="btn-save" disabled>Save</button>
    <span class="status" id="status"></span>
  </div>

  <script src="options.js"></script>
</body>

</html>
